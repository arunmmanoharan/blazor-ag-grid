name: CI

on:
  push:
    branches: [ master ]
    tags-ignore: [ 'v=*' ]
  create:
  release:
    types: [ published ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup dotnet sdk
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: setup node (required for the ag-Grid interop esbuild bundle)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: build & pack
        shell: bash
        run: |
          # VersionBuild uses the built-in, monotonically increasing run number;
          # Major/Minor/Patch come from Versions.props.
          dotnet build --configuration Release -p:VersionBuild=${{ github.run_number }}
          dotnet pack src/BlazorAgGrid/BlazorAgGrid.csproj \
            --configuration Release -p:VersionBuild=${{ github.run_number }} \
            --output ./artifacts

      - name: upload package as artifact
        if: startsWith(github.ref, 'refs/tags/v=')
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: ./artifacts/*.nupkg

  push-nuget-preview:
    needs: build
    if: github.event_name == 'create' && startsWith(github.ref, 'refs/tags/v=')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: download package from artifact
        uses: actions/download-artifact@v4
        with:
          name: package
          path: ./artifacts

      - name: setup dotnet sdk
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: publish to GitHub Packages (GPR)
        shell: bash
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

## Future - when publishing to NuGet.org, add a push-nuget-release job gated on
## the `release` event that pushes ./artifacts/*.nupkg to nuget.org using a
## NUGET_TOKEN secret.
